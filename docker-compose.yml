
version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: supportdesk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - db

#3 .application-prod.yml (Docker / Production)

spring:
  datasource:
#    url: jdbc:postgresql://db:5432/supportdesk
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  ai:
    gemini:
      api-key: ${GEMINI_API_KEY}

jwt:
  secret: ${JWT_SECRET:a9f3e72d8c1b45f6e9a21d7c0b4f89e2a5c7d1f8e6b9a0d4c3f2e7b5a1c9}
  expiration: ${JWT_EXPIRATION:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health

server:
  port:8080
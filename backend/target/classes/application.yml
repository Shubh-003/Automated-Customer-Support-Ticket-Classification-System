
spring:
  datasource:
    url: jdbc:postgresql://db:5432/supportdesk
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  ai:
    gemini:
      api-key: ${GEMINI_API_KEY}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}   # 1 day

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health